name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose || true

      - name: Clippy
        run: cargo clippy -- -D warnings || true

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t rust-multi-tenant-auth-template .

      - name: Start services
        run: |
          cp .env.example .env 2>/dev/null || true
          docker compose build
          docker compose up -d
          sleep 15

      - name: Run health check
        run: |
          curl -f http://localhost:8003/health || (docker compose logs && exit 1)

      - name: Tear down
        if: always()
        run: docker compose down 2>/dev/null || true
