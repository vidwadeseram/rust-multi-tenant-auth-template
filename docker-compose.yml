services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    environment:
      APP_PORT: 8000
      BIND_PORT: 8000
      DATABASE_URL: postgres://postgres:postgres@db:5432/rust_multi_tenant_auth
    ports:
      - "8004:8000"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rust_multi_tenant_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rust_multi_tenant_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:v1.0.1

volumes:
  postgres_data:
